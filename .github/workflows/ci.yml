---
name: DevSecOps Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: flask-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # JOB 1 : Lint YAML
  lint-yaml:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on k8s manifests
        run: yamllint -c .yamllint.yml k8s/

  # JOB 2 : Build Docker image
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # JOB 3 : Scan des dependances (Trivy FS)
  trivy-fs-scan:
    name: Trivy - Scan dependances FS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH,MEDIUM"
          format: "table"
          exit-code: "0"

      - name: Run Trivy FS scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-fs-results.sarif"
          exit-code: "0"

      - name: Upload Trivy FS results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-fs"

  # JOB 4 : Scan de l'image Docker (Trivy image)
  trivy-image-scan:
    name: Trivy - Scan image Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run Trivy image scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH,MEDIUM"
          format: "table"
          exit-code: "0"

      - name: Run Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-image-results.sarif"
          exit-code: "0"

      - name: Upload Trivy image results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image-results.sarif"
          category: "trivy-image"

  # JOB 5 : Politique de securite (Conftest)
  conftest-policy:
    name: Conftest - Politique Kubernetes
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTEST_VERSION="v0.50.0"
          CONFTEST_FILE="conftest_0.50.0_Linux_x86_64.tar.gz"
          BASE_URL="https://github.com/open-policy-agent/conftest/releases/download"
          wget -q "${BASE_URL}/${CONFTEST_VERSION}/${CONFTEST_FILE}"
          tar xzf "${CONFTEST_FILE}"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run Conftest policy check
        run: |
          echo "=== Verification des politiques de securite Kubernetes ==="
          conftest test k8s/deployment.yaml --policy policy/ --output table || true
          echo ""
          echo "=== Resultat detaille (violations detectees intentionnellement) ==="
          conftest test k8s/deployment.yaml --policy policy/ || true

  # JOB 6 : Resume de securite
  security-summary:
    name: Resume de securite
    runs-on: ubuntu-latest
    needs: [lint-yaml, build, trivy-fs-scan, trivy-image-scan, conftest-policy]
    if: always()
    steps:
      - name: Afficher le resume du pipeline
        run: |
          echo "## Resume du pipeline DevSecOps" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Etape | Statut |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint YAML | ${{ needs.lint-yaml.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Docker | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy FS | ${{ needs.trivy-fs-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy Image | ${{ needs.trivy-image-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Conftest | ${{ needs.conftest-policy.result }} |" >> "$GITHUB_STEP_SUMMARY"
