name: DevSecOps Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: flask-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Lint YAML
  # ─────────────────────────────────────────────
  lint-yaml:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint on k8s manifests
        run: yamllint -c .yamllint.yml k8s/

      - name: Run yamllint on GitHub Actions workflows
        run: yamllint -c .yamllint.yml .github/workflows/

  # ─────────────────────────────────────────────
  # JOB 2 : Build Docker image
  # ─────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 3 : Scan des dépendances (Trivy FS)
  # ─────────────────────────────────────────────
  trivy-fs-scan:
    name: Trivy - Scan dépendances (FS)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH,MEDIUM"
          format: "table"
          exit-code: "0"  # Ne pas faire échouer le pipeline, seulement rapporter

      - name: Run Trivy FS scan - SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-fs-results.sarif"
          exit-code: "0"

      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-fs"

  # ─────────────────────────────────────────────
  # JOB 4 : Scan de l'image Docker (Trivy image)
  # ─────────────────────────────────────────────
  trivy-image-scan:
    name: Trivy - Scan image Docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Run Trivy image scan (table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH,MEDIUM"
          format: "table"
          exit-code: "0"

      - name: Run Trivy image scan - SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-image-results.sarif"
          exit-code: "0"

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image-results.sarif"
          category: "trivy-image"

  # ─────────────────────────────────────────────
  # JOB 5 : Politique de sécurité (Conftest)
  # ─────────────────────────────────────────────
  conftest-policy:
    name: Conftest - Vérification politique Kubernetes
    runs-on: ubuntu-latest
    needs: lint-yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.50.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run Conftest policy check on K8s manifests
        run: |
          echo "=== Vérification des politiques de sécurité Kubernetes ==="
          conftest test k8s/deployment.yaml --policy policy/ --output table || true
          echo ""
          echo "=== Résultat détaillé ==="
          conftest test k8s/deployment.yaml --policy policy/ || exit 1

  # ─────────────────────────────────────────────
  # JOB 6 : Résumé de sécurité
  # ─────────────────────────────────────────────
  security-summary:
    name: Résumé de sécurité
    runs-on: ubuntu-latest
    needs: [trivy-fs-scan, trivy-image-scan, conftest-policy]
    if: always()
    steps:
      - name: Afficher le résumé du pipeline
        run: |
          echo "## Résumé du pipeline DevSecOps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint YAML | ${{ needs.lint-yaml.result }} |" >> $GITHUB_STEP_SUMMARY  # noqa
          echo "| Build Docker | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS Scan | ${{ needs.trivy-fs-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Image Scan | ${{ needs.trivy-image-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Conftest Policy | ${{ needs.conftest-policy.result }} |" >> $GITHUB_STEP_SUMMARY
